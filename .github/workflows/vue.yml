name: Vue CI

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/vue.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/vue.yml'
  workflow_dispatch:

concurrency:
  group: vue-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & type-check (Node 24.16.0)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint + eslint)
        run: pnpm lint

      - name: Build (vue-tsc + vite build)
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: web/dist/
          retention-days: 7
          if-no-files-found: error
