<?xml version="1.0" encoding="UTF-8"?>
<!-- Neon Trails · ARENA FLOOR · 960×640 · vaporwave pastel cool
     Diseñado para sentarse DEBAJO de los actores cyan/magenta sin competir.
     Solo SMIL animations · sin CSS keyframes · Batik 1.17 ready. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
  <defs>

    <!-- Cielo · violeta noche → malva → horizonte -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0A0A12"/>
      <stop offset="35%" stop-color="#1A1730"/>
      <stop offset="65%" stop-color="#2E2848"/>
      <stop offset="100%" stop-color="#4F4470"/>
    </linearGradient>

    <!-- Piso · lavanda desaturada → malva profundo abajo -->
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7A6E9A" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#4F4470" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1A1730" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Luna · cyan polvo (no sol naranja) -->
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#D8E8F0" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#B8C8D0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#88A8B8" stop-opacity="0"/>
    </radialGradient>

    <!-- Halo lejano (rosa polvo) detrás de la luna -->
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#C8A8B8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C8A8B8" stop-opacity="0"/>
    </radialGradient>

    <!-- Patrón rejilla pastel (suelo · perspectiva) -->
    <pattern id="grid-floor" patternUnits="userSpaceOnUse" width="48" height="40" x="0" y="0">
      <path d="M 0 0 L 48 0" stroke="#88A8B8" stroke-width="0.6" opacity="0.45"/>
      <path d="M 0 0 L 0 40" stroke="#88A8B8" stroke-width="0.45" opacity="0.35"/>
    </pattern>

    <!-- Patrón fino para perspectiva profunda -->
    <pattern id="grid-fine" patternUnits="userSpaceOnUse" width="24" height="24">
      <path d="M 0 0 L 24 0 M 0 0 L 0 24" stroke="#B0A0C8" stroke-width="0.3" opacity="0.25"/>
    </pattern>

    <!-- Glow suave para luna -->
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ======== CIELO ======== -->
  <rect width="960" height="320" fill="url(#sky)"/>

  <!-- Estrellas (parpadeo) -->
  <g fill="#D8C8E0">
    <circle cx="80"  cy="48"  r="0.9"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="80"  r="0.7"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.4s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="40"  r="1.1"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="360" cy="100" r="0.6"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.1s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="55"  r="0.9"><animate attributeName="opacity" values="0.4;0.95;0.4" dur="2.6s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="90"  r="0.8"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="3.0s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="30"  r="1.0"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="65"  r="0.7"><animate attributeName="opacity" values="0.3;0.75;0.3" dur="3.5s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="110" r="0.85"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.9s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="60"  cy="140" r="0.5" opacity="0.5"/>
    <circle cx="220" cy="170" r="0.4" opacity="0.4"/>
    <circle cx="420" cy="150" r="0.6" opacity="0.5"/>
    <circle cx="580" cy="180" r="0.5" opacity="0.45"/>
    <circle cx="760" cy="160" r="0.55" opacity="0.5"/>
    <circle cx="880" cy="200" r="0.45" opacity="0.4"/>
  </g>

  <!-- LUNA + halo · cyan polvo · NO sol naranja -->
  <g transform="translate(480 130)">
    <ellipse cx="0" cy="0" rx="180" ry="80" fill="url(#halo)" opacity="0.7"/>
    <circle cx="0" cy="0" r="55" fill="url(#moon)" filter="url(#soft-glow)"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#B8C8D0" stroke-width="0.6" opacity="0.45"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#D8E8F0" stroke-width="0.4" opacity="0.55">
      <animate attributeName="r" values="24;28;24" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.7;0.35" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bandas horizontales horizonte (pastel) -->
  <rect x="0" y="294" width="960" height="2" fill="#C8A8B8" opacity="0.5"/>
  <rect x="0" y="300" width="960" height="1" fill="#B0A0C8" opacity="0.4"/>
  <rect x="0" y="308" width="960" height="1" fill="#88A8B8" opacity="0.35"/>

  <!-- ======== PISO ======== -->
  <rect x="0" y="320" width="960" height="320" fill="url(#floor)"/>

  <!-- Rejilla fina (capa profunda) -->
  <rect x="0" y="320" width="960" height="320" fill="url(#grid-fine)" opacity="0.5"/>

  <!-- Rejilla principal · animada (efecto de avance hacia cámara) -->
  <g>
    <rect x="0" y="320" width="960" height="360" fill="url(#grid-floor)" opacity="0.75"/>
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; 0 40" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Líneas de perspectiva (pastel teal · convergiendo al centro del horizonte) -->
  <g stroke="#88A8B8" fill="none" opacity="0.55">
    <line x1="480" y1="320" x2="0"   y2="640" stroke-width="0.7"/>
    <line x1="480" y1="320" x2="160" y2="640" stroke-width="0.5"/>
    <line x1="480" y1="320" x2="320" y2="640" stroke-width="0.45"/>
    <line x1="480" y1="320" x2="480" y2="640" stroke-width="0.55"/>
    <line x1="480" y1="320" x2="640" y2="640" stroke-width="0.45"/>
    <line x1="480" y1="320" x2="800" y2="640" stroke-width="0.5"/>
    <line x1="480" y1="320" x2="960" y2="640" stroke-width="0.7"/>
  </g>

  <!-- Resplandores pastel al borde del piso (luces de pista distantes) -->
  <g>
    <ellipse cx="120" cy="500" rx="140" ry="40" fill="#C8A8B8" opacity="0.18">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="4s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="840" cy="520" rx="160" ry="44" fill="#88A8B8" opacity="0.18">
      <animate attributeName="opacity" values="0.12;0.28;0.12" dur="4.5s" begin="1.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="480" cy="600" rx="240" ry="50" fill="#B0A0C8" opacity="0.18">
      <animate attributeName="opacity" values="0.1;0.22;0.1" dur="5s" begin="0.8s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Líneas horizontales pastel reforzando horizonte (más fuertes lejos) -->
  <g stroke-width="0.5" fill="none">
    <line x1="0" y1="340" x2="960" y2="340" stroke="#C8A8B8" opacity="0.45"/>
    <line x1="0" y1="370" x2="960" y2="370" stroke="#B0A0C8" opacity="0.35"/>
    <line x1="0" y1="410" x2="960" y2="410" stroke="#88A8B8" opacity="0.28"/>
    <line x1="0" y1="460" x2="960" y2="460" stroke="#7A6E9A" opacity="0.25"/>
    <line x1="0" y1="520" x2="960" y2="520" stroke="#4F4470" opacity="0.3"/>
  </g>

  <!-- Borde superior del piso · neón pastel definido -->
  <rect x="0" y="318" width="960" height="2.5" fill="#D8E8F0" opacity="0.5"/>
  <rect x="0" y="321" width="960" height="0.8" fill="#FFFFFF" opacity="0.3"/>

  <!-- Vignette suave en bordes -->
  <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
    <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="960" height="640" fill="url(#vignette)" pointer-events="none"/>
</svg>
