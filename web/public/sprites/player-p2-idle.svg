<?xml version="1.0" encoding="UTF-8"?>
<!-- Neon Trails · P2 humanoide · IDLE · top-down 28x28
     Pose neutra. Brazos colgando, piernas paralelas. Respiración por opacity. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="28" height="28">
  <defs>
    <filter id="glow-p2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="glow-p2-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF99CC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF3399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="player-p2-idle" filter="url(#glow-p2)">
    <!-- CABEZA (frente / norte) -->
    <circle cx="14" cy="6.5" r="2.4" fill="#0a0a12" stroke="#FF3399" stroke-width="0.75"/>
    <circle cx="14" cy="6.5" r="1.2" fill="#FF99CC" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.85;0.5" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- HOMBROS (línea horizontal) -->
    <line x1="9.5" y1="10.5" x2="18.5" y2="10.5" stroke="#FF3399" stroke-width="0.7"/>

    <!-- TORSO (óvalo) -->
    <ellipse cx="14" cy="15" rx="4" ry="4.5" fill="#0a0a12" stroke="#FF3399" stroke-width="0.9"/>
    <!-- Línea dorsal -->
    <line x1="14" y1="10.5" x2="14" y2="19" stroke="#FF3399" stroke-width="0.55" opacity="0.85"/>
    <!-- Costuras laterales -->
    <line x1="10.5" y1="13" x2="17.5" y2="13" stroke="#FF3399" stroke-width="0.3" opacity="0.5"/>

    <!-- BRAZOS -->
    <line x1="9.5" y1="10.5" x2="7.5" y2="17.5" stroke="#FF3399" stroke-width="0.9" stroke-linecap="round"/>
    <line x1="18.5" y1="10.5" x2="20.5" y2="17.5" stroke="#FF3399" stroke-width="0.9" stroke-linecap="round"/>
    <!-- X en antebrazos -->
    <line x1="7" y1="16" x2="8" y2="17.5" stroke="#FF99CC" stroke-width="0.35" opacity="0.7"/>
    <line x1="8" y1="16" x2="7" y2="17.5" stroke="#FF99CC" stroke-width="0.35" opacity="0.7"/>
    <line x1="20" y1="16" x2="21" y2="17.5" stroke="#FF99CC" stroke-width="0.35" opacity="0.7"/>
    <line x1="21" y1="16" x2="20" y2="17.5" stroke="#FF99CC" stroke-width="0.35" opacity="0.7"/>
    <!-- Manos -->
    <circle cx="7.5" cy="18.2" r="0.7" fill="#FF3399"/>
    <circle cx="20.5" cy="18.2" r="0.7" fill="#FF3399"/>

    <!-- PIERNAS -->
    <line x1="12" y1="19" x2="11.3" y2="25.5" stroke="#FF3399" stroke-width="1" stroke-linecap="round"/>
    <line x1="16" y1="19" x2="16.7" y2="25.5" stroke="#FF3399" stroke-width="1" stroke-linecap="round"/>
    <!-- Líneas diagonales TRON en piernas -->
    <line x1="11" y1="22.5" x2="12" y2="24" stroke="#FF99CC" stroke-width="0.4" opacity="0.6"/>
    <line x1="17" y1="22.5" x2="16" y2="24" stroke="#FF99CC" stroke-width="0.4" opacity="0.6"/>
    <!-- Pies -->
    <line x1="10.8" y1="25.5" x2="11.8" y2="25.5" stroke="#FF3399" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="16.2" y1="25.5" x2="17.2" y2="25.5" stroke="#FF3399" stroke-width="1.3" stroke-linecap="round"/>

    <!-- NÚCLEO del torso (pulso) -->
    <circle cx="14" cy="15" r="1.6" fill="url(#glow-p2-core)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
