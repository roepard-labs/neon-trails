<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <!-- Glow rojo para el eclipse -->
    <filter id="glow-r" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"  result="b1"/>
      <feGaussianBlur stdDeviation="16" result="b2"/>
      <feGaussianBlur stdDeviation="32" result="b3"/>
      <feMerge><feMergeNode in="b3"/><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Glow suave para el texto -->
    <filter id="glow-txt" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="5"  result="b1"/>
      <feGaussianBlur stdDeviation="14" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip para el eclipse (semiluna) -->
    <clipPath id="eclipse-clip">
      <!-- Círculo principal recortado por otro círculo desplazado -->
      <circle cx="300" cy="200" r="110"/>
    </clipPath>
    <!-- Gradiente radial interior del eclipse -->
    <radialGradient id="eclipse-fill" cx="42%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#ff4422"/>
      <stop offset="55%"  stop-color="#cc0011"/>
      <stop offset="100%" stop-color="#660000"/>
    </radialGradient>
    <!-- Gradiente borde del eclipse -->
    <radialGradient id="eclipse-rim" cx="50%" cy="50%" r="50%">
      <stop offset="80%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#ff2200"/>
    </radialGradient>
    <!-- Scanlines sutiles -->
    <pattern id="scan" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect x="0" y="1" width="1" height="1" fill="rgba(0,0,0,0.22)"/>
    </pattern>
  </defs>

  <!-- ── FONDO NEGRO ── -->
  <rect width="600" height="400" fill="#000000"/>

  <!-- ── SCANLINES ── -->
  <rect width="600" height="400" fill="url(#scan)" opacity="0.6"/>

  <!-- ── ECLIPSE: cuerpo rojo ── -->
  <circle cx="300" cy="200" r="110"
          fill="url(#eclipse-fill)"
          filter="url(#glow-r)"/>

  <!-- ── ECLIPSE: luna negra que lo tapa (efecto eclipse) ── -->
  <circle cx="258" cy="170" r="102" fill="#000000"/>

  <!-- ── ECLIPSE: arc rim (anillo de fuego visible) ── -->
  <!-- Doble stroke para simular corona -->
  <circle cx="300" cy="200" r="110"
          fill="none" stroke="#ff2200" stroke-width="3"
          filter="url(#glow-r)" opacity="0.9"/>
  <circle cx="300" cy="200" r="110"
          fill="none" stroke="#ff6644" stroke-width="1.2" opacity="0.6"/>

  <!-- Corona exterior difusa -->
  <circle cx="300" cy="200" r="118"
          fill="none" stroke="#ff110044" stroke-width="14"
          filter="url(#glow-r)" opacity="0.35"/>

  <!-- ── TEXTO: Jaco ── -->
  <!-- Glow layer -->
  <text x="300" y="220"
        font-family="'Courier New', Courier, monospace"
        font-weight="900" font-size="108" letter-spacing="6"
        fill="#ffffff"
        text-anchor="middle"
        filter="url(#glow-txt)">Jaco</text>
  <!-- Crisp layer -->
  <text x="300" y="220"
        font-family="'Courier New', Courier, monospace"
        font-weight="900" font-size="108" letter-spacing="6"
        fill="#ffffff"
        text-anchor="middle">Jaco</text>
</svg>
