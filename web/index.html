<!DOCTYPE html>
<html lang="es">
<head>

  <title>Neon Trails — panel mock</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Neon Trails</h1>
    <p class="subtitle">Estado mock de partida / ranking (sin conexión al JAR aún)</p>

  <main>
    <section class="card" id="match-state">
      <h2>Partida simulada</h2>

        <dt>P1</dt><dd id="p1-score">—</dd>
        <dt>P2</dt><dd id="p2-score">—</dd>
        <dt>Modo moto</dt><dd id="bike-hint">Activa con Q / U en el juego Swing</dd>
      </dl>
    </section>

    <section class="card">
      <h2>Top 3 (mock JSON)</h2>
      <ol id="leaderboard"></ol>
    </section>
  </main>

  <footer>
    <small>Stub frontend para evolución futura (API o exportación de puntajes).</small>
  </footer>

  <script src="app.js" type="module"></script>

</html>
