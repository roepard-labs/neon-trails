# Gateway unificado de Neon Trails (incluido dentro del http{} de nginx).
# Un solo server :80 enruta las tres capas por path. Vue llama a /api en el
# mismo origen, así que no hay CORS.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Raíz: la SPA Vue (estáticos compilados).
    root /var/www/web;
    index index.html;

    client_max_body_size 35m;

    # ── Laravel (php-fpm): API, panel Filament, Livewire, health ────────────
    # Estas rutas resuelven contra el front controller de Laravel.
    location ~ ^/(api|admin|livewire|up)(/|$) {
        root /var/www/api/public;
        try_files $uri /index.php?$query_string;
    }

    # ── Estáticos servidos desde api/public (assets de Filament, storage) ───
    location ~ ^/(css/filament|js/filament|build|storage)(/|$) {
        root /var/www/api/public;
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # ── Handler PHP (front controller de Laravel) ───────────────────────────
    location ~ \.php$ {
        root /var/www/api/public;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
        fastcgi_hide_header X-Powered-By;
    }

    # ── WebSocket de noVNC ──────────────────────────────────────────────────
    # El cliente noVNC abre el socket en /websockify (raíz, su valor por defecto).
    # Debe ir ANTES del fallback de la SPA para no caer en index.html.
    location /websockify {
        proxy_pass http://127.0.0.1:6080/websockify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Juego Swing vía noVNC (estáticos + WS bajo /game/websockify) ─────────
    location /game/ {
        proxy_pass http://127.0.0.1:6080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sesiones VNC largas: sin timeout agresivo.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── SPA Vue: fallback de history mode ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
