# docker-compose.yml — entorno LOCAL del monolito Neon Trails + MariaDB 11.
#
# Reproduce el setup de Dokploy en local: en producción, MariaDB es un servicio
# Database nativo de Dokploy y la app se despliega desde el Dockerfile; aquí
# ambos corren juntos. Funciona sin configurar nada (defaults para dev); copia
# .docker/env.reference a .env para sobreescribir credenciales/dominio.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mariadb
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-neon_trails}
      DB_USERNAME: ${DB_USERNAME:-neon}
      DB_PASSWORD: ${DB_PASSWORD:-neon}
      LEADERBOARD_API_URL: http://127.0.0.1/api
      VNC_RESOLUTION: ${VNC_RESOLUTION:-1280x800}
      FILAMENT_ADMIN_NAME: ${FILAMENT_ADMIN_NAME:-Neon Admin}
      FILAMENT_ADMIN_EMAIL: ${FILAMENT_ADMIN_EMAIL:-admin@neon-trails.local}
      FILAMENT_ADMIN_PASSWORD: ${FILAMENT_ADMIN_PASSWORD:-password}
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-neon_trails}
      MARIADB_USER: ${DB_USERNAME:-neon}
      MARIADB_PASSWORD: ${DB_PASSWORD:-neon}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "${DB_PORT_HOST:-3306}:3306"

volumes:
  mariadb-data:
