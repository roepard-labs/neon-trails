    <line x1="1.5" y1="7" x2="12.5" y2="7" stroke="#AAFFFF" stroke-width="0.55" opacity="0.8"/>
    <line x1="3" y1="3" x2="11" y2="11" stroke="#AAFFFF" stroke-width="0.35" opacity="0.5"/>
    <line x1="11" y1="3" x2="3" y2="11" stroke="#AAFFFF" stroke-width="0.35" opacity="0.5"/>
    <!-- Núcleo brillante -->
    <circle cx="7" cy="7" r="1.6" fill="#AAFFFF" opacity="0.5">
      
    </circle>
