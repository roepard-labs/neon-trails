<svg xmlns="http://www.w3.org/2000/svg" width="220" height="56" viewBox="0 0 220 56">
  <defs>
    <filter id="glow-btn" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <!-- Shadow layers -->
  <polygon points="6,6 218,6 222,10 222,52 10,52 6,48" fill="#440033"/>
  <polygon points="4,4 216,4 220,8 220,50 8,50 4,46"   fill="#880055"/>
  <!-- Glow halo -->
  <polygon points="2,2 214,2 218,6 218,48 6,48 2,44"   fill="#ff3399" filter="url(#glow-btn)" opacity="0.45"/>
  <!-- Body -->
  <polygon points="2,2 214,2 218,6 218,48 6,48 2,44"   fill="#ff3399"/>
  <!-- Highlight -->
  <polygon points="2,2 214,2 218,6 218,18 2,18"         fill="#ffffff" fill-opacity="0.15"/>
  <!-- Text -->
  <text x="110" y="31"
        font-family="'Courier New', Courier, monospace"
        font-weight="700" font-size="13" letter-spacing="2"
        fill="#0a0a12" text-anchor="middle" dominant-baseline="middle">MENÚ PRINCIPAL</text>
</svg>
