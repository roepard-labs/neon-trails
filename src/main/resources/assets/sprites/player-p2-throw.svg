<?xml version="1.0" encoding="UTF-8"?>
<!-- Neon Trails · P2 humanoide · THROW · top-down 28x28
     Brazo derecho extendido al frente lanzando el disco. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="28" height="28">
  <defs>
    <filter id="glow-p2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="glow-p2-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF99CC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF3399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="player-p2-throw" filter="url(#glow-p2)">
    <!-- CABEZA -->
    <circle cx="14" cy="6.5" r="2.4" fill="#0a0a12" stroke="#FF3399" stroke-width="0.75"/>
    <circle cx="14" cy="6.5" r="1.2" fill="#FF99CC" opacity="0.85"/>

    <!-- HOMBROS rotados levemente -->
    <line x1="9.5" y1="11" x2="18.5" y2="10" stroke="#FF3399" stroke-width="0.7"/>

    <!-- TORSO -->
    <ellipse cx="14" cy="15" rx="4" ry="4.5" fill="#0a0a12" stroke="#FF3399" stroke-width="0.9"/>
    <line x1="14" y1="10.5" x2="14" y2="19" stroke="#FF3399" stroke-width="0.55" opacity="0.85"/>
    <line x1="10.5" y1="13" x2="17.5" y2="13" stroke="#FF3399" stroke-width="0.3" opacity="0.5"/>

    <!-- BRAZO IZQUIERDO · atrás para balance -->
    <line x1="9.5" y1="11" x2="6.5" y2="18" stroke="#FF3399" stroke-width="0.9" stroke-linecap="round" opacity="0.85"/>
    <circle cx="6.5" cy="18.2" r="0.7" fill="#FF3399" opacity="0.85"/>

    <!-- BRAZO DERECHO · EXTENDIDO al frente (norte/arriba) -->
    <!-- Hombro → codo → muñeca apuntando hacia arriba -->
    <line x1="18.5" y1="10" x2="20.5" y2="6" stroke="#FF3399" stroke-width="1" stroke-linecap="round"/>
    <line x1="20.5" y1="6" x2="22" y2="2" stroke="#FF3399" stroke-width="1" stroke-linecap="round"/>
    <!-- Codo articulación -->
    <circle cx="20.5" cy="6" r="0.5" fill="#FF99CC"/>
    <!-- Mano · puño abierto -->
    <circle cx="22" cy="2" r="0.9" fill="#0a0a12" stroke="#FF99CC" stroke-width="0.5"/>

    <!-- DISCO FANTASMA escapando (motion blur) -->
    <circle cx="23.5" cy="0.8" r="1.2" fill="none" stroke="#FF99CC" stroke-width="0.3" opacity="0.4">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="-0.5" r="0.8" fill="none" stroke="#FF99CC" stroke-width="0.25" opacity="0.25">
      <animate attributeName="opacity" values="0.35;0;0.35" dur="0.4s" begin="0.1s" repeatCount="indefinite"/>
    </circle>
    <!-- Líneas de velocidad del brazo -->
    <line x1="21" y1="3" x2="23" y2="1" stroke="#FF99CC" stroke-width="0.3" opacity="0.5">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="5" x2="22" y2="3" stroke="#FF99CC" stroke-width="0.25" opacity="0.35">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="0.4s" begin="0.08s" repeatCount="indefinite"/>
    </line>

    <!-- PIERNAS firmes (stance) -->
    <line x1="11.5" y1="19" x2="10.5" y2="25.5" stroke="#FF3399" stroke-width="1" stroke-linecap="round"/>
    <line x1="16.5" y1="19" x2="17.5" y2="25.5" stroke="#FF3399" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="25.5" x2="11" y2="25.5" stroke="#FF3399" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="17" y1="25.5" x2="18" y2="25.5" stroke="#FF3399" stroke-width="1.3" stroke-linecap="round"/>

    <!-- NÚCLEO · brillante (energy charge) -->
    <circle cx="14" cy="15" r="1.8" fill="url(#glow-p2-core)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="0.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.6;2.1;1.6" dur="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
