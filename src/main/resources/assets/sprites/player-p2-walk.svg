<?xml version="1.0" encoding="UTF-8"?>
<!-- Neon Trails · P2 humanoide · WALK · top-down 28x28
     Ciclo de caminata: bob vertical + brazos asimétricos. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="28" height="28">
  <defs>
    <filter id="glow-p2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="glow-p2-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF99CC" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF3399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="player-p2-walk" filter="url(#glow-p2)">
    <!-- BOB del cuerpo entero -->
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; 0 -0.4; 0 0; 0 -0.4; 0 0"
                      keyTimes="0; 0.25; 0.5; 0.75; 1"
                      dur="0.5s" repeatCount="indefinite"/>

    <!-- CABEZA -->
    <circle cx="14" cy="6.5" r="2.4" fill="#0a0a12" stroke="#FF3399" stroke-width="0.75"/>
    <circle cx="14" cy="6.5" r="1.2" fill="#FF99CC" opacity="0.7"/>

    <!-- HOMBROS + TORSO -->
    <line x1="9.5" y1="10.5" x2="18.5" y2="10.5" stroke="#FF3399" stroke-width="0.7"/>
    <ellipse cx="14" cy="15" rx="4" ry="4.5" fill="#0a0a12" stroke="#FF3399" stroke-width="0.9"/>
    <line x1="14" y1="10.5" x2="14" y2="19" stroke="#FF3399" stroke-width="0.55" opacity="0.85"/>
    <line x1="10.5" y1="13" x2="17.5" y2="13" stroke="#FF3399" stroke-width="0.3" opacity="0.5"/>

    <!-- BRAZOS asimétricos (izquierdo adelante, derecho atrás) -->
    <!-- Izquierdo · cruzando frente al torso -->
    <line x1="9.5" y1="10.5" x2="9" y2="17" stroke="#FF3399" stroke-width="0.9" stroke-linecap="round">
      <animate attributeName="x2" values="9;7.5;9;10.5;9" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="17;17.5;17;17.5;17" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <!-- Derecho · atrás -->
    <line x1="18.5" y1="10.5" x2="19" y2="17" stroke="#FF3399" stroke-width="0.9" stroke-linecap="round">
      <animate attributeName="x2" values="19;20.5;19;17.5;19" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="17;17.5;17;17.5;17" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <!-- Manos -->
    <circle cx="9" cy="17.5" r="0.7" fill="#FF3399">
      <animate attributeName="cx" values="9;7.5;9;10.5;9" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="17.5;18;17.5;18;17.5" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="19" cy="17.5" r="0.7" fill="#FF3399">
      <animate attributeName="cx" values="19;20.5;19;17.5;19" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="17.5;18;17.5;18;17.5" dur="0.5s" repeatCount="indefinite"/>
    </circle>

    <!-- PIERNAS · ciclo cruzado -->
    <line x1="12" y1="19" x2="11" y2="25.5" stroke="#FF3399" stroke-width="1" stroke-linecap="round">
      <animate attributeName="x2" values="11;10;11;12.5;11" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="16" y1="19" x2="17" y2="25.5" stroke="#FF3399" stroke-width="1" stroke-linecap="round">
      <animate attributeName="x2" values="17;18;17;15.5;17" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <!-- Pies -->
    <line x1="10.5" y1="25.5" x2="11.5" y2="25.5" stroke="#FF3399" stroke-width="1.3" stroke-linecap="round">
      <animate attributeName="x1" values="10.5;9.5;10.5;12;10.5" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="11.5;10.5;11.5;13;11.5" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="16.5" y1="25.5" x2="17.5" y2="25.5" stroke="#FF3399" stroke-width="1.3" stroke-linecap="round">
      <animate attributeName="x1" values="16.5;17.5;16.5;15;16.5" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="17.5;18.5;17.5;16;17.5" dur="0.5s" repeatCount="indefinite"/>
    </line>

    <!-- NÚCLEO -->
    <circle cx="14" cy="15" r="1.6" fill="url(#glow-p2-core)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
